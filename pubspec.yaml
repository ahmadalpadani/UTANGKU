name: utangku_app
description: "Aplikasi pencatatan utang piutang dengan WhatsApp integration."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Database & Storage
  sqflite: ^2.3.0
  path: ^1.8.3
  # shared_preferences: ^2.2.2  # Not used yet

  # State Management
  provider: ^6.1.1

  # UI Components
  cupertino_icons: ^1.0.6
  fl_chart: ^0.66.0

  # Date & Time
  intl: ^0.20.2
  table_calendar: ^3.0.9

  # WhatsApp & Contacts
  url_launcher: ^6.2.1
  whatsapp_unilink: ^2.1.0

  # Utilities
  currency_formatter: ^2.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
